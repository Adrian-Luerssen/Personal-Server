name: Android APK Release

on:
  push:
    branches:
      - main
    tags:
      - 'android-v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to create or update'
        required: true
        default: 'android-latest'

permissions:
  contents: write

concurrency:
  group: android-apk-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    env:
      VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
      VITE_NATIVE_APP: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve release tag
        id: release
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            release_tag="${{ inputs.release_tag }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            release_tag="${{ github.ref_name }}"
          else
            release_tag="android-latest"
          fi
          echo "tag=$release_tag" >> "$GITHUB_OUTPUT"

      - name: Validate Android app configuration
        env:
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
        run: |
          if [ -z "$VITE_API_BASE" ]; then
            echo "::error::VITE_API_BASE is not configured; refusing to publish an APK that cannot reach the API."
            exit 1
          fi
          if ! printf '%s' "$VITE_API_BASE" | grep -Eq '^https://'; then
            echo "::error::VITE_API_BASE must be an HTTPS origin or API URL for Android builds."
            exit 1
          fi
          if printf '%s' "$VITE_API_BASE" | grep -Eqi 'localhost|127\.0\.0\.1|10\.0\.2\.2'; then
            echo "::error::VITE_API_BASE points at a local address; Android release builds need the public API URL."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Run API cache tests
        run: node --test src/apiCache.test.mjs

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run mobile shell tests
        env:
          VITE_NATIVE_APP: ''
        run: npx playwright test tests/auth/native-app.spec.ts tests/auth/mobile-gate.spec.ts --project=chromium

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Decode Android signing key
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          missing=0
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is not configured; refusing to publish an unsigned APK."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/release-keystore.jks

      - name: Build release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/frontend/android/release-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleRelease

      - name: Prepare APK artifact
        run: |
          APK_PATH="$(find android/app/build/outputs/apk/release -name '*.apk' ! -name '*unsigned*' | head -n 1)"
          if [ -z "$APK_PATH" ]; then
            echo "::error::No signed release APK found"
            exit 1
          fi
          if echo "$APK_PATH" | grep -qi unsigned; then
            echo "::error::Refusing to upload unsigned APK: $APK_PATH"
            exit 1
          fi
          APK_SIGNER="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          if [ -z "$APK_SIGNER" ]; then
            echo "::error::Unable to locate apksigner in Android SDK"
            exit 1
          fi
          "$APK_SIGNER" verify --verbose "$APK_PATH"
          cp "$APK_PATH" personal-server.apk

      - name: Move stable release tag
        if: steps.release.outputs.tag == 'android-latest'
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          git tag --force "$RELEASE_TAG" "$GITHUB_SHA"
          git push origin "refs/tags/$RELEASE_TAG" --force

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_NAME: ${{ steps.release.outputs.tag }}
          RELEASE_COMMIT: ${{ github.sha }}
        run: |
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || \
            gh release create "$RELEASE_TAG" --title "$RELEASE_NAME" --notes "Android APK build for Personal Server."
          gh release edit "$RELEASE_TAG" \
            --title "$RELEASE_NAME" \
            --notes "Latest Android APK build for commit ${RELEASE_COMMIT}."
          gh release upload "$RELEASE_TAG" personal-server.apk --clobber
