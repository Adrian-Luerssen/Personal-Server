name: Android APK Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Optional release tag to create or update'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: android-apk-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    env:
      VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
      VITE_NATIVE_APP: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve release tag
        id: release
        run: |
          app_version="$(node -p "require('./package.json').version")"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.release_tag }}" ]; then
            release_tag="${{ inputs.release_tag }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            release_tag="${{ github.ref_name }}"
          else
            release_tag="android-v${app_version}.${GITHUB_RUN_NUMBER}"
          fi
          release_version="${release_tag#android-v}"
          release_version="${release_version#v}"
          if ! printf '%s' "$release_version" | grep -Eq '^[0-9]+(\.[0-9]+){0,3}$'; then
            release_version="${app_version}.${GITHUB_RUN_NUMBER}"
          fi
          echo "tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "stable_tag=android-latest" >> "$GITHUB_OUTPUT"
          echo "base_version=$app_version" >> "$GITHUB_OUTPUT"
          echo "release_version=$release_version" >> "$GITHUB_OUTPUT"

      - name: Validate Android app configuration
        env:
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
        run: |
          if [ -z "$VITE_API_BASE" ]; then
            echo "::error::VITE_API_BASE is not configured; refusing to publish an APK that cannot reach the API."
            exit 1
          fi
          if ! printf '%s' "$VITE_API_BASE" | grep -Eq '^https://'; then
            echo "::error::VITE_API_BASE must be an HTTPS origin or API URL for Android builds."
            exit 1
          fi
          if printf '%s' "$VITE_API_BASE" | grep -Eqi 'localhost|127\.0\.0\.1|10\.0\.2\.2'; then
            echo "::error::VITE_API_BASE points at a local address; Android release builds need the public API URL."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Resolve app version
        id: app_version
        run: |
          base_version="${{ steps.release.outputs.base_version }}"
          release_version="${{ steps.release.outputs.release_version }}"
          build_time="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo "version=$release_version" >> "$GITHUB_OUTPUT"
          echo "base_version=$base_version" >> "$GITHUB_OUTPUT"
          echo "build_time=$build_time" >> "$GITHUB_OUTPUT"

      - name: Run API cache, Android, workflow, and permission tests
        run: node --test src/apiCache.test.mjs src/appVersion.test.mjs src/importFileTypes.test.mjs src/importProgress.test.mjs src/mobilePlatform.test.mjs src/androidReleaseWorkflow.test.mjs src/androidWidgets.test.mjs src/androidNativeWidgets.test.mjs src/androidNativeShell.test.mjs src/notificationPermission.test.mjs

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run mobile shell tests
        env:
          VITE_NATIVE_APP: ''
        run: npx playwright test tests/auth/native-app.spec.ts tests/auth/mobile-gate.spec.ts --project=chromium

      - name: Build web app
        env:
          VITE_APP_VERSION: ${{ steps.app_version.outputs.version }}
          VITE_APP_BUILD_TIME: ${{ steps.app_version.outputs.build_time }}
        run: npm run build

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Decode Android signing key
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          missing=0
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is not configured; refusing to publish an unsigned APK."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/release-keystore.jks

      - name: Build release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/frontend/android/release-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_VERSION_NAME: ${{ steps.app_version.outputs.version }}
          ANDROID_VERSION_CODE: ${{ github.run_number }}
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleRelease

      - name: Prepare APK artifact
        run: |
          APK_PATH="$(find android/app/build/outputs/apk/release -name '*.apk' ! -name '*unsigned*' | head -n 1)"
          if [ -z "$APK_PATH" ]; then
            echo "::error::No signed release APK found"
            exit 1
          fi
          if echo "$APK_PATH" | grep -qi unsigned; then
            echo "::error::Refusing to upload unsigned APK: $APK_PATH"
            exit 1
          fi
          APK_SIGNER="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          if [ -z "$APK_SIGNER" ]; then
            echo "::error::Unable to locate apksigner in Android SDK"
            exit 1
          fi
          "$APK_SIGNER" verify --verbose "$APK_PATH"
          cp "$APK_PATH" personal-server.apk

      - name: Prepare release metadata
        env:
          APP_VERSION: ${{ steps.app_version.outputs.version }}
          APP_BASE_VERSION: ${{ steps.app_version.outputs.base_version }}
          APP_BUILD_TIME: ${{ steps.app_version.outputs.build_time }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_COMMIT: ${{ github.sha }}
          RELEASE_REF: ${{ github.ref_name }}
          RELEASE_REF_TYPE: ${{ github.ref_type }}
          RELEASE_REPOSITORY: ${{ github.repository }}
          RELEASE_RUN_ID: ${{ github.run_id }}
          RELEASE_RUN_NUMBER: ${{ github.run_number }}
        run: |
          APK_SHA256="$(sha256sum personal-server.apk | awk '{print $1}')"
          APK_SIZE_BYTES="$(wc -c < personal-server.apk | tr -d '[:space:]')"
          APK_SIZE_MB="$(node -e "console.log((Number(process.argv[1]) / 1024 / 1024).toFixed(2))" "$APK_SIZE_BYTES")"
          RELEASE_COMMIT_SHORT="${RELEASE_COMMIT::7}"
          COMMIT_URL="https://github.com/${RELEASE_REPOSITORY}/commit/${RELEASE_COMMIT}"
          RUN_URL="https://github.com/${RELEASE_REPOSITORY}/actions/runs/${RELEASE_RUN_ID}"
          COMMIT_SUBJECT="$(git log -1 --pretty=%s "$RELEASE_COMMIT")"
          RECENT_COMMITS="$(git log -5 --pretty=format:'- `%h` %s')"
          RELEASE_CHANNEL="Versioned Android APK release"

          cat > release-notes.md <<EOF
          ## Personal Server Android APK

          ### Deployment
          | Field | Value |
          | --- | --- |
          | Channel | ${RELEASE_CHANNEL} |
          | App version | \`${APP_VERSION}\` |
          | Base app version | \`${APP_BASE_VERSION}\` |
          | Android versionCode | \`${RELEASE_RUN_NUMBER}\` |
          | Build time | \`${APP_BUILD_TIME}\` |
          | Release tag | \`${RELEASE_TAG}\` |
          | Source ref | \`${RELEASE_REF_TYPE}:${RELEASE_REF}\` |
          | Commit | [\`${RELEASE_COMMIT_SHORT}\`](${COMMIT_URL}) |
          | Workflow run | [#${RELEASE_RUN_NUMBER}](${RUN_URL}) |
          | API target | \`VITE_API_BASE\` repository secret, validated as public HTTPS |

          ### APK Asset
          | Field | Value |
          | --- | --- |
          | File | \`personal-server.apk\` |
          | Size | \`${APK_SIZE_MB} MB\` |
          | SHA-256 | \`${APK_SHA256}\` |
          | Signing | Signed release APK verified with Android \`apksigner\` |

          ### Verification
          - API cache and app version tests passed.
          - Mobile shell and mobile landing gate Playwright tests passed.
          - Vite production build completed.
          - Capacitor Android project sync completed.
          - Gradle \`assembleRelease\` completed.

          ### Included Changes
          Latest commit: ${COMMIT_SUBJECT}

          ${RECENT_COMMITS}

          ### Install
          Download \`personal-server.apk\` from the release assets and install it on Android. If Android blocks the install, allow installs from your browser or file manager for this APK.
          EOF

          cat > personal-server-release.json <<EOF
          {
            "appVersion": "${APP_VERSION}",
            "baseAppVersion": "${APP_BASE_VERSION}",
            "androidVersionCode": "${RELEASE_RUN_NUMBER}",
            "buildTime": "${APP_BUILD_TIME}",
            "releaseTag": "${RELEASE_TAG}",
            "releaseChannel": "${RELEASE_CHANNEL}",
            "sourceRef": "${RELEASE_REF_TYPE}:${RELEASE_REF}",
            "commit": "${RELEASE_COMMIT}",
            "workflowRun": "${RUN_URL}",
            "apk": {
              "file": "personal-server.apk",
              "sizeBytes": ${APK_SIZE_BYTES},
              "sha256": "${APK_SHA256}",
              "signed": true
            },
            "verification": [
              "api-cache-and-version-tests",
              "mobile-shell-playwright-tests",
              "vite-production-build",
              "capacitor-android-sync",
              "gradle-assemble-release",
              "apksigner-verify"
            ]
          }
          EOF

      - name: Move stable android-latest pointer
        env:
          RELEASE_TAG: ${{ steps.release.outputs.stable_tag }}
        run: |
          git tag --force "$RELEASE_TAG" "$GITHUB_SHA"
          git push origin "refs/tags/$RELEASE_TAG" --force

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_NAME: 'Personal Server Android v${{ steps.app_version.outputs.version }}'
        run: |
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || \
            gh release create "$RELEASE_TAG" --title "$RELEASE_NAME" --notes-file release-notes.md
          gh release edit "$RELEASE_TAG" \
            --title "$RELEASE_NAME" \
            --notes-file release-notes.md
          gh release upload "$RELEASE_TAG" personal-server.apk personal-server-release.json --clobber
