<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <!-- Gradient for main accent -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <!-- Subtle glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer hexagon frame -->
  <path 
    d="M32 4L56 18v28L32 60L8 46V18L32 4z" 
    stroke="url(#accentGradient)" 
    stroke-width="2.5" 
    fill="none"
    stroke-linejoin="round"
    filter="url(#glow)"
  />
  
  <!-- Inner data visualization elements -->
  <g opacity="0.9">
    <!-- Bar chart representation (left side - represents data/metrics) -->
    <rect x="18" y="34" width="4" height="12" rx="1.5" fill="#7dd3fc"/>
    <rect x="24" y="28" width="4" height="18" rx="1.5" fill="#60a5fa"/>
    <rect x="30" y="22" width="4" height="24" rx="1.5" fill="url(#accentGradient)"/>
    
    <!-- Pulse/heartbeat line (right side - represents activity/life) -->
    <path 
      d="M38 36h4l2-8 3 16 2-8h5" 
      stroke="#4ade80" 
      stroke-width="2" 
      stroke-linecap="round" 
      stroke-linejoin="round"
      fill="none"
    />
  </g>
  
  <!-- Center node - represents "personal" / you -->
  <circle cx="32" cy="32" r="3" fill="url(#accentGradient)" opacity="0.5"/>
  
  <!-- Connection lines from center to corners (subtle, represents integration) -->
  <g stroke="#7dd3fc" stroke-width="0.5" opacity="0.3">
    <line x1="32" y1="32" x2="32" y2="8"/>
    <line x1="32" y1="32" x2="54" y2="20"/>
    <line x1="32" y1="32" x2="54" y2="44"/>
    <line x1="32" y1="32" x2="32" y2="56"/>
    <line x1="32" y1="32" x2="10" y2="44"/>
    <line x1="32" y1="32" x2="10" y2="20"/>
  </g>
</svg>
