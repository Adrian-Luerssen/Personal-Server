<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="accentGradientLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <filter id="glowLight" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer hexagon frame -->
  <path 
    d="M32 4L56 18v28L32 60L8 46V18L32 4z" 
    stroke="url(#accentGradientLight)" 
    stroke-width="2.5" 
    fill="rgba(2, 132, 199, 0.05)"
    stroke-linejoin="round"
    filter="url(#glowLight)"
  />
  
  <!-- Inner data visualization elements -->
  <g opacity="0.95">
    <!-- Bar chart representation -->
    <rect x="18" y="34" width="4" height="12" rx="1.5" fill="#0284c7"/>
    <rect x="24" y="28" width="4" height="18" rx="1.5" fill="#0369a1"/>
    <rect x="30" y="22" width="4" height="24" rx="1.5" fill="url(#accentGradientLight)"/>
    
    <!-- Pulse/heartbeat line -->
    <path 
      d="M38 36h4l2-8 3 16 2-8h5" 
      stroke="#16a34a" 
      stroke-width="2" 
      stroke-linecap="round" 
      stroke-linejoin="round"
      fill="none"
    />
  </g>
  
  <!-- Center node -->
  <circle cx="32" cy="32" r="3" fill="#0284c7" opacity="0.6"/>
  
  <!-- Connection lines -->
  <g stroke="#0284c7" stroke-width="0.5" opacity="0.25">
    <line x1="32" y1="32" x2="32" y2="8"/>
    <line x1="32" y1="32" x2="54" y2="20"/>
    <line x1="32" y1="32" x2="54" y2="44"/>
    <line x1="32" y1="32" x2="32" y2="56"/>
    <line x1="32" y1="32" x2="10" y2="44"/>
    <line x1="32" y1="32" x2="10" y2="20"/>
  </g>
</svg>
