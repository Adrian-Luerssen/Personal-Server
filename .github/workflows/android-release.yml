name: Android APK Release

on:
  push:
    branches:
      - main
    tags:
      - 'android-v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to create or update'
        required: true
        default: 'android-latest'

permissions:
  contents: write

concurrency:
  group: android-apk-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    env:
      VITE_API_BASE: ${{ secrets.VITE_API_BASE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve release tag
        id: release
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            release_tag="${{ inputs.release_tag }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            release_tag="${{ github.ref_name }}"
          else
            release_tag="android-latest"
          fi
          echo "tag=$release_tag" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Decode Android signing key
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "ANDROID_KEYSTORE_BASE64 is not configured; continuing without a release keystore."
            exit 0
          fi
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/release-keystore.jks

      - name: Build release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/frontend/android/release-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleRelease

      - name: Prepare APK artifact
        run: |
          APK_PATH="$(find android/app/build/outputs/apk/release -name '*.apk' | head -n 1)"
          if [ -z "$APK_PATH" ]; then
            echo "No APK found"
            exit 1
          fi
          cp "$APK_PATH" personal-server.apk

      - name: Move stable release tag
        if: steps.release.outputs.tag == 'android-latest'
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          git tag --force "$RELEASE_TAG" "$GITHUB_SHA"
          git push origin "refs/tags/$RELEASE_TAG" --force

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_NAME: ${{ steps.release.outputs.tag }}
          RELEASE_COMMIT: ${{ github.sha }}
        run: |
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || \
            gh release create "$RELEASE_TAG" --title "$RELEASE_NAME" --notes "Android APK build for Personal Server."
          gh release edit "$RELEASE_TAG" \
            --title "$RELEASE_NAME" \
            --notes "Latest Android APK build for commit ${RELEASE_COMMIT}."
          gh release upload "$RELEASE_TAG" personal-server.apk --clobber
